<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQUATWOLF TECH PROJECT PLAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,700&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#3b0c0c;--bg2:#461010;--bg3:#511414;--bg4:#5e1919;--bg5:#6d1f1f;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.17);--border3:rgba(255,255,255,.28);
  --text:#fff7f5;--muted:#b28585;--muted2:#d4adad;
  --accent:#d4483f;--accent-h:#e85a50;
  --green:#3ee89f;--blue:#6fb3ff;--amber:#ffb840;--pink:#ff7d9b;--purple:#c3aaff;--red:#ff6257;
  --head:'Barlow Condensed',sans-serif;--font:'Barlow Condensed','Manrope',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14.5px;letter-spacing:.015em}
body{background:radial-gradient(1400px 900px at 18% -10%, #6b1a16 0%, #4a1010 45%, #350a0a 100%) fixed}
::-webkit-scrollbar{width:6px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:4px}
.app{display:flex;flex-direction:column;height:100vh}

/* TOPBAR */
.topbar{height:56px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--border2);padding:0 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo{font-family:var(--head);font-size:20px;font-weight:700;font-style:italic;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.logo b{color:#fff;background:var(--accent);padding:1px 7px 1px 4px;border-radius:4px;margin-left:2px}
.sep{width:1px;height:24px;background:var(--border2);flex-shrink:0}
.view-tabs{display:flex;gap:3px}
.vtab{background:transparent;border:1px solid transparent;color:var(--muted2);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--head);font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.vtab:hover{color:var(--text);border-color:var(--border2)}
.vtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.stats{display:flex;gap:12px;margin-right:6px}
.stat{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);white-space:nowrap}
.sdot{width:7px;height:7px;border-radius:50%}
.sn{font-weight:500}.sl{color:var(--muted)}
.tbtn{background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:7px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.tbtn:hover{border-color:var(--border3);background:var(--bg5)}
.tbtn svg{width:13px;height:13px;flex-shrink:0}
.btn-add{background:#fff;border-color:#fff;color:#7a1410;font-weight:800}
.btn-add:hover{background:#ffe9e5;border-color:#ffe9e5}
.sync-status{display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);color:var(--muted2);white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.sync-dot.synced{background:var(--green)}
.sync-dot.dirty{background:var(--amber)}
.sync-dot.pushing{background:var(--blue);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* FILTERBAR */
.filterbar{min-height:44px;background:rgba(0,0,0,.18);border-bottom:1px solid var(--border);padding:6px 18px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto;flex-wrap:nowrap}
.fl{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);flex-shrink:0}
.search{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:7px;font-family:var(--font);font-size:12px;outline:none;width:170px;flex-shrink:0}
.search:focus{border-color:var(--accent)}
.chip{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12.5px;font-family:var(--font);font-weight:600;transition:all .15s;white-space:nowrap;flex-shrink:0}
.chip:hover{color:var(--text);border-color:var(--border3)}
.chip.on{color:#fff;background:var(--accent);border-color:var(--accent)}
.fsel{background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);padding:5px 8px;border-radius:7px;font-family:var(--font);font-size:11px;outline:none;cursor:pointer;flex-shrink:0}
.fsel option{background:var(--bg3);color:var(--text)}

/* SYNC BANNER */
.sync-banner{background:rgba(245,166,35,.12);border-bottom:1px solid rgba(245,166,35,.3);padding:7px 18px;display:none;align-items:center;gap:10px;flex-shrink:0;font-size:11px;color:var(--amber);font-family:var(--mono)}
.sync-banner.show{display:flex}
.sync-banner-btn{background:var(--amber);color:#000;border:none;padding:4px 12px;border-radius:5px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;margin-left:auto}

/* MAIN */
.main{flex:1;overflow:hidden;position:relative}
.view{height:100%;display:none}
.view.on{display:flex}
#kv{gap:10px;padding:14px 16px;overflow-x:auto;overflow-y:hidden;align-items:flex-start}
#gv{flex-direction:column;overflow:hidden}
#tv{flex-direction:column;overflow:auto;padding:0}

/* KANBAN */
.kcol{background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:12px;width:250px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 170px);border-top-width:4px;border-top-style:solid}
.kcol.dragover{border-color:var(--accent);background:var(--bg3)}
.kcol-head{padding:11px 12px 9px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);flex-shrink:0}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ctitle{font-family:var(--head);font-size:14px;font-weight:600;letter-spacing:.08em;flex:1;text-transform:uppercase}
.ccnt{font-size:10px;color:var(--muted2);font-family:var(--mono);background:var(--bg4);padding:1px 6px;border-radius:8px}
.kcards{padding:7px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.card{background:rgba(0,0,0,.30);border:1px solid var(--border);border-radius:12px;padding:11px 12px;cursor:pointer;transition:all .15s;position:relative}
.card:hover{border-color:var(--border3);background:rgba(0,0,0,.42)}
.card.dragging{opacity:.4}
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.card-cat{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);flex:1}
.ragdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pri{font-size:9px;font-family:var(--mono);font-weight:600;padding:1px 6px;border-radius:4px;background:transparent;border:1px solid var(--border3);color:var(--muted2);flex-shrink:0}
.pri.P1{border-color:var(--red);color:var(--red)}
.pri.P2{border-color:var(--amber);color:var(--amber)}
.card-title{font-size:14px;font-weight:700;line-height:1.35;margin-bottom:7px}
.badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;font-weight:500}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-owner{font-size:10px;color:var(--muted2);font-family:var(--mono)}
.pbar{height:4px;background:var(--bg5);border-radius:3px;margin-top:8px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:3px;background:var(--accent)}
.card-date{font-size:10px;color:var(--muted2);font-family:var(--mono);margin-top:6px}
.card-comment{font-size:11.5px;color:var(--muted2);line-height:1.45;margin-top:6px;border-left:2px solid var(--border2);padding-left:7px;white-space:pre-line}
.card-subtasks{margin-top:7px;display:flex;flex-direction:column;gap:3px}
.subtask{font-size:11.5px;color:var(--muted2);display:flex;align-items:flex-start;gap:5px;padding:3px 6px;background:rgba(255,255,255,.05);border-radius:5px;cursor:pointer}
.subtask:hover{background:rgba(255,255,255,.1)}
.subtask.done{text-decoration:line-through;opacity:.5}
.subtask b{font-weight:400;color:var(--muted);flex-shrink:0}
.card-mile{font-size:10px;color:var(--purple);font-family:var(--mono);margin-top:5px}
.card-dep{font-size:10px;color:var(--blue);font-family:var(--mono);margin-top:4px}
.card-block{font-size:10px;color:var(--red);margin-top:5px;background:rgba(224,72,62,.08);border:1px solid rgba(224,72,62,.25);border-radius:4px;padding:3px 7px}
.card-actions{position:absolute;top:7px;right:7px;display:none;gap:3px}
.card:hover .card-actions{display:flex}
.ca-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);background:var(--bg4);color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ca-btn:hover{border-color:var(--border3);color:var(--text)}
.ca-btn.del:hover{border-color:rgba(185,58,50,.5);color:var(--accent-h)}
.ca-btn svg{width:11px;height:11px}
.add-card-btn{margin:7px;padding:7px;border-radius:7px;border:1px dashed var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;flex-shrink:0}
.add-card-btn:hover{border-color:var(--border3);color:var(--text)}
.empty-col{padding:20px 12px;text-align:center;color:var(--muted);font-size:11px;font-style:italic}

/* GANTT */
.gwrap{flex:1;overflow:auto;position:relative}
.ginner{position:relative;min-width:100%}
.ghead{position:sticky;top:0;z-index:30;background:var(--bg2);border-bottom:1px solid var(--border2)}
.ghead-months,.ghead-weeks{display:flex}
.gm{border-right:1px solid var(--border2);font-family:var(--head);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);padding:5px 0 3px;text-align:center;white-space:nowrap;overflow:hidden;flex-shrink:0}
.gw{border-right:1px solid var(--border);font-family:var(--mono);font-size:8.5px;color:var(--muted);padding:2px 0 4px;text-align:center;white-space:nowrap;overflow:hidden;flex-shrink:0}
.glabel{position:sticky;left:0;z-index:31;background:var(--bg2);border-right:1px solid var(--border2);width:270px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.grow{display:flex;border-bottom:1px solid var(--border);min-height:34px;position:relative}
.grow:hover{background:rgba(247,245,242,.02)}
.grow-label{position:sticky;left:0;z-index:20;background:var(--bg);border-right:1px solid var(--border2);width:270px;flex-shrink:0;padding:5px 14px;display:flex;flex-direction:column;justify-content:center;cursor:pointer}
.grow:hover .grow-label{background:var(--bg3)}
.grp-row{background:var(--bg2)!important;border-bottom:1px solid var(--border2)}
.grp-row .grow-label{background:var(--bg2);font-family:var(--head);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:default}
.gl-title{font-size:12.5px;font-weight:700;line-height:1.3;display:flex;align-items:center;gap:6px}
.gl-title .ragdot{width:7px;height:7px}
.gl-sub{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.gcanvas{position:relative;flex-shrink:0}
.gbar{position:absolute;top:7px;height:20px;border-radius:4px;cursor:pointer;overflow:hidden;transition:filter .15s}
.gbar:hover{filter:brightness(1.25)}
.gbar-fill{position:absolute;left:0;top:0;bottom:0;opacity:.45;border-radius:4px 0 0 4px}
.gbar-txt{position:absolute;inset:0;display:flex;align-items:center;padding:0 7px;font-size:9px;font-weight:600;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gmile{position:absolute;top:11px;width:11px;height:11px;transform:rotate(45deg) translate(-4px,-4px);border:1.5px solid var(--purple);background:var(--bg);z-index:5;cursor:pointer}
.gmile.done{background:var(--purple)}
.gtoday{position:absolute;top:0;bottom:0;width:1.5px;background:var(--accent);z-index:9;pointer-events:none}
.gtoday::after{content:'TODAY';position:sticky;top:44px;font-size:8px;font-family:var(--mono);color:var(--accent);background:var(--bg);padding:1px 3px;margin-left:2px}
.gweekend{position:absolute;top:0;bottom:0;background:rgba(247,245,242,.015);pointer-events:none}
.grow.sub-row{min-height:24px}
.grow.sub-row .grow-label{padding:2px 14px 2px 24px}
.gl-subname{font-size:9.5px;color:var(--muted2);font-style:italic;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gsbar{position:absolute;top:5px;height:13px;border-radius:3px;cursor:pointer;font-size:8px;font-family:var(--mono);display:flex;align-items:center;padding:0 5px;white-space:nowrap;overflow:hidden}
.gsbar:hover{filter:brightness(1.35)}
.gsbar.done{text-decoration:line-through;opacity:.75}
.gtoolbar{padding:6px 18px;background:rgba(0,0,0,.18);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
.unsched{padding:14px 18px;border-top:1px solid var(--border2);background:var(--bg2);flex-shrink:0;max-height:170px;overflow-y:auto}
.unsched h3{font-family:var(--head);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.unsched-items{display:flex;flex-wrap:wrap;gap:6px}
.us-chip{background:var(--bg3);border:1px solid rgba(245,166,35,.3);color:var(--muted2);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s}
.us-chip:hover{border-color:var(--amber);color:var(--text)}
.us-chip b{color:var(--amber);font-family:var(--mono);font-size:9px;font-weight:500;margin-right:5px}

/* TABLE */
.ptable{width:100%;border-collapse:collapse;font-size:13.5px}
.ptable th{position:sticky;top:0;background:var(--bg2);z-index:10;font-family:var(--head);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border2);cursor:pointer;white-space:nowrap;user-select:none}
.ptable th:hover{color:var(--text)}
.ptable th .arr{font-size:9px;margin-left:3px;color:var(--accent)}
.ptable td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.ptable tr:hover td{background:rgba(247,245,242,.025);cursor:pointer}
.t-title{font-weight:700}
.t-notes{font-size:10px;color:var(--muted2);margin-top:3px;max-width:340px;white-space:pre-line}
.t-mono{font-family:var(--mono);font-size:11px;color:var(--muted2);white-space:nowrap}
.tpbar{width:70px;height:5px;background:var(--bg5);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.tpbar i{display:block;height:100%;background:var(--accent)}

/* STATUS COLORS */
.s-planned{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3)}
.s-progress{background:rgba(245,166,35,.15);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.s-review{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.s-complete{background:rgba(46,204,138,.15);color:var(--green);border:1px solid rgba(46,204,138,.3)}
.s-hold{background:rgba(224,96,126,.15);color:var(--pink);border:1px solid rgba(224,96,126,.3)}
.s-missing{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.cat-Technology{color:var(--blue)}
.cat-Ecom{color:var(--green)}
.cat-CRM{color:var(--pink)}
.cat-DigitalMarketing{color:var(--purple)}
.cat-Martech{color:var(--amber)}
.cat-CSOps{color:#2dd4bf}
.cat-AI{color:#f472b6}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:5}
.modal-head h2{font-family:var(--head);font-size:19px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex:1}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--border3);color:var(--text)}
.modal-close svg{width:14px;height:14px}
.modal-body{padding:16px 22px;display:flex;flex-direction:column;gap:13px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono)}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:7px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.field select option{background:var(--bg3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.list-stack{display:flex;flex-direction:column;gap:5px}
.li-row{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px}
.li-row input[type=text]{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:12px;outline:none;padding:2px}
.li-row input[type=date]{background:var(--bg4);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;border-radius:4px;padding:2px 4px;outline:none;width:120px}
.li-row input[type=checkbox]{accent-color:var(--accent)}
.li-del{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px;display:flex}
.li-del:hover{color:var(--accent-h)}
.li-del svg{width:12px;height:12px}
.btn-mini{background:transparent;border:1px dashed var(--border2);color:var(--muted2);padding:6px 11px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:11px;display:flex;align-items:center;gap:5px;transition:all .15s;align-self:flex-start}
.btn-mini:hover{border-color:var(--border3);color:var(--text)}
.dep-grid{display:flex;flex-wrap:wrap;gap:5px}
.dep-opt{font-size:10px;border:1px solid var(--border2);border-radius:12px;padding:3px 9px;cursor:pointer;color:var(--muted2);transition:all .12s}
.dep-opt.on{border-color:var(--blue);color:var(--blue);background:rgba(74,158,255,.1)}
.modal-foot{padding:14px 22px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600}
.btn-cancel:hover{border-color:var(--border3);color:var(--text)}
.btn-save{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:7px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700}
.btn-save:hover{background:var(--accent-h)}
.btn-del-card{background:rgba(185,58,50,.12);border:1px solid rgba(185,58,50,.35);color:var(--accent-h);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;margin-right:auto}
.btn-del-card:hover{background:rgba(185,58,50,.22)}
.gh-info{font-size:11px;color:var(--muted2);line-height:1.6;padding:10px 12px;background:var(--bg3);border-radius:7px;border:1px solid var(--border)}

let projects = [];
let editingId = null, tempSubs = [], tempMiles = [], tempDeps = [];
let sortKey = 'start', sortDir = 1;
let showSubs = (function(){try{return (localStorage.getItem('swpp_showsubs')||'1')==='1'}catch(e){return true}})();
function toggleSubs(){showSubs=!showSubs;try{localStorage.setItem('swpp_showsubs',showSubs?'1':'0')}catch(e){};renderGantt()}
const LSD = 'swpp_data_v3', LSG = 'swpp_gh_v2';

function normalize(p){
  return Object.assign({id:uid(),title:'',cat:'Technology',status:'planned',start:'',end:'',owner:'',priority:'',rag:'G',pct:0,effort:'',budget:'',deps:[],blockers:'',notes:'',milestones:[],subtasks:[],updated:''},p);
}
function loadLocal(){
  try{
    const raw = localStorage.getItem(LSD);
    if(raw){const d = JSON.parse(raw); if(Array.isArray(d.items)) return d.items.map(normalize);}
  }catch(e){}
  return SEED.map(normalize);
}
function save(){
  projects.forEach(p=>{if(!p.updated)p.updated=today()});
  try{localStorage.setItem(LSD,JSON.stringify({version:DATA_VERSION,items:projects}))}catch(e){}
  if(ghConfigured()){setSync('dirty','Unsynced changes');document.getElementById('sync-banner').classList.add('show');}
}
function touch(p){p.updated = today()}
function today(){return new Date().toISOString().slice(0,10)}

// ============================================================
//  FILTERS
// ============================================================
let activeCat = 'all';
function setCat(c,el){
  activeCat = c;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  render();
}
function filtered(){
  const q = document.getElementById('f-search').value.trim().toLowerCase();
  const ow = document.getElementById('f-owner').value;
  const pr = document.getElementById('f-pri').value;
  const rg = document.getElementById('f-rag').value;
  const st = document.getElementById('f-status').value;
  return projects.filter(p=>{
    if(activeCat!=='all' && p.cat!==activeCat) return false;
    if(ow && p.owner!==ow) return false;
    if(pr && p.priority!==pr) return false;
    if(rg && p.rag!==rg) return false;
    if(st && p.status!==st) return false;
    if(q && !(p.title+' '+p.owner+' '+p.notes+' '+(p.subtasks||[]).map(s=>s.text).join(' ')).toLowerCase().includes(q)) return false;
    return true;
  });
}
function buildFilterOptions(){
  const owners = [...new Set(projects.map(p=>p.owner).filter(Boolean))].sort();
  const os = document.getElementById('f-owner');
  const cur = os.value;
  os.innerHTML = '<option value="">Owner: All</option>'+owners.map(o=>`<option ${o===cur?'selected':''}>${esc(o)}</option>`).join('');
  const ss = document.getElementById('f-status');
  const cs = ss.value;
  ss.innerHTML = '<option value="">Status: All</option>'+STATUSES.map(s=>`<option value="${s.id}" ${s.id===cs?'selected':''}>${s.label}</option>`).join('');
  document.getElementById('cat-chips').innerHTML = CATS.map(c=>`<button class="chip ${activeCat===c?'on':''}" onclick="setCat('${esc(c)}',this)">${esc(c)}</button>`).join('');
}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.vtab').forEach(el=>el.classList.remove('on'));
  document.getElementById(v==='kanban'?'kv':v==='gantt'?'gv':'tv').classList.add('on');
  document.getElementById('tab-'+v).classList.add('on');
  requestAnimationFrame(render);
}
function currentView(){
  if(document.getElementById('kv').classList.contains('on')) return 'kanban';
  if(document.getElementById('gv').classList.contains('on')) return 'gantt';
  return 'table';
}
function render(){
  buildFilterOptions();
  renderStats();
  const v = currentView();
  if(v==='kanban') renderKanban();
  else if(v==='gantt') renderGantt();
  else renderTable();
}
function renderStats(){
  const counts = {}; STATUSES.forEach(s=>counts[s.id]=0);
  let red = 0;
  projects.forEach(p=>{counts[p.status]=(counts[p.status]||0)+1; if(p.rag==='R'&&p.status!=='complete')red++;});
  const show = [
    {n:counts.progress,l:'In Progress',c:'#f5a623'},
    {n:counts.planned,l:'Planned',c:'#4a9eff'},
    {n:counts.review,l:'Review',c:'#a78bfa'},
    {n:counts.complete,l:'Done',c:'#2ecc8a'},
    {n:counts.missing,l:'Req. Missing',c:'#f5a623'},
    {n:red,l:'At Risk',c:'#e0483e'},
  ];
  document.getElementById('stats-bar').innerHTML = show.map(s=>
    `<div class="stat"><div class="sdot" style="background:${s.c}"></div><span class="sn">${s.n}</span><span class="sl">${s.l}</span></div>`).join('');
}
function catClass(c){return 'cat-'+String(c||'').replace(/[^A-Za-z]/g,'')}
function fmtD(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()]+' '+String(dt.getFullYear()).slice(2);
}
function stObj(id){return STATUSES.find(s=>s.id===id)||STATUSES[0]}

// ============================================================
//  KANBAN
// ============================================================
function renderKanban(){
  const data = filtered();
  const kv = document.getElementById('kv');
  kv.innerHTML = '';
  STATUSES.forEach(col=>{
    const cards = data.filter(p=>p.status===col.id);
    const el = document.createElement('div');
    el.className = 'kcol';
    el.style.borderTopColor = col.color;
    el.dataset.status = col.id;
    el.innerHTML = `
      <div class="kcol-head">
        <div class="cdot" style="background:${col.color}"></div>
        <div class="ctitle">${col.label}</div>
        <div class="ccnt">${cards.length}</div>
      </div>
      <div class="kcards">${cards.length? cards.map(cardHTML).join('') : '<div class="empty-col">No initiatives</div>'}</div>
      <button class="add-card-btn" onclick="openAddModal('${col.id}')">+ Add card</button>`;
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dragover')});
    el.addEventListener('dragleave',()=>el.classList.remove('dragover'));
    el.addEventListener('drop',e=>{
      e.preventDefault(); el.classList.remove('dragover');
      const id = e.dataTransfer.getData('text/plain');
      const p = projects.find(x=>x.id===id);
      if(p && p.status!==col.id){
        p.status = col.id;
        if(col.id==='complete'){p.pct=100;p.rag='G'}
        touch(p); save(); render(); showToast('Moved to '+col.label);
      }
    });
    kv.appendChild(el);
  });
  kv.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',c.dataset.id);c.classList.add('dragging')});
    c.addEventListener('dragend',()=>c.classList.remove('dragging'));
  });
}
function cardHTML(c){
  const dateStr = c.start ? `<div class="card-date">📅 ${fmtD(c.start)}${c.end&&c.end!==c.start?' → '+fmtD(c.end):''}</div>` : '';
  const notes = c.notes ? `<div class="card-comment">${esc(c.notes)}</div>` : '';
  const subs = (c.subtasks&&c.subtasks.length) ? `<div class="card-subtasks">${c.subtasks.map((s,i)=>
    `<div class="subtask ${s.done?'done':''}" onclick="toggleSub(event,'${c.id}',${i})"><b>${s.done?'☑':'☐'}</b>${esc(s.text)}${s.start?` <span style="color:var(--muted);font-family:var(--mono);font-size:9px;white-space:nowrap">${fmtD(s.start)}→${fmtD(s.end)}</span>`:''}</div>`).join('')}</div>` : '';
  const nm = nextMile(c);
  const mile = nm ? `<div class="card-mile">◆ ${fmtD(nm.date)} — ${esc(nm.label)}</div>` : '';
  const dep = (c.deps&&c.deps.length) ? `<div class="card-dep">⇢ depends on: ${c.deps.map(d=>{const t=projects.find(x=>x.id===d);return t?esc(t.title):''}).filter(Boolean).join(', ')}</div>` : '';
  const blk = c.blockers ? `<div class="card-block">⛔ ${esc(c.blockers)}</div>` : '';
  const pct = (c.status!=='missing') ? `<div class="pbar"><i style="width:${c.pct||0}%;background:${RAGS[c.rag]?RAGS[c.rag].color:'#b93a32'}"></i></div>` : '';
  return `
    <div class="card" draggable="true" data-id="${c.id}" onclick="openEditModal('${c.id}')">
      <div class="card-actions">
        <button class="ca-btn" onclick="event.stopPropagation();openEditModal('${c.id}')" title="Edit"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 2l3 3-8 8H3v-3l8-8z"/></svg></button>
        <button class="ca-btn del" onclick="event.stopPropagation();confirmDelete('${c.id}')" title="Delete"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/></svg></button>
      </div>
      <div class="card-top">
        <div class="card-cat ${catClass(c.cat)}">${esc(c.cat)}</div>
        ${c.priority?`<span class="pri ${c.priority}">${c.priority}</span>`:''}
        <div class="ragdot" title="RAG: ${RAGS[c.rag]?RAGS[c.rag].label:''}" style="background:${RAGS[c.rag]?RAGS[c.rag].color:'#666'}"></div>
      </div>
      <div class="card-title">${esc(c.title)}</div>
      <div class="card-meta">
        <span class="badge s-${c.status}">${stObj(c.status).label}</span>
        ${c.owner?`<span class="card-owner">${esc(c.owner)}</span>`:''}
        ${c.effort?`<span class="pri">${c.effort}</span>`:''}
        ${(c.status!=='missing'&&c.pct>0)?`<span class="card-owner">${c.pct}%</span>`:''}
      </div>
      ${pct}${dateStr}${mile}${dep}${blk}${notes}${subs}
    </div>`;
}
function nextMile(c){
  const t = today();
  const up = (c.milestones||[]).filter(m=>!m.done&&m.date).sort((a,b)=>a.date<b.date?-1:1);
  return up.find(m=>m.date>=t)||up[0]||null;
}
function toggleSub(e,id,i){
  e.stopPropagation();
  const p = projects.find(x=>x.id===id);
  if(!p||!p.subtasks[i])return;
  p.subtasks[i].done = !p.subtasks[i].done;
  touch(p); save(); render();
}

// ============================================================
//  GANTT (weekly)
// ============================================================
const DAY = 86400000, PXD = 3.6;
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}
function renderGantt(){
  const gv = document.getElementById('gv');
  const data = filtered();
  const sched = data.filter(p=>p.start&&p.end);
  const unsched = data.filter(p=>!p.start||!p.end);

  let min = new Date('2026-01-01'), max = new Date('2027-03-31');
  sched.forEach(p=>{
    const s=new Date(p.start+'T00:00:00'), e=new Date(p.end+'T00:00:00');
    if(s<min)min=s; if(e>max)max=e;
    (p.milestones||[]).forEach(m=>{if(m.date){const md=new Date(m.date+'T00:00:00');if(md>max)max=md}});
  });
  min = mondayOf(new Date(min.getTime()-7*DAY));
  max = new Date(mondayOf(max).getTime()+21*DAY);
  const totalDays = Math.round((max-min)/DAY);
  const W = Math.round(totalDays*PXD);
  const x = d => Math.round((new Date(d+'T00:00:00')-min)/DAY*PXD);

  // month + week headers
  let mh='', cur=new Date(min);
  while(cur<max){
    const nm = new Date(cur.getFullYear(),cur.getMonth()+1,1);
    const end = nm<max?nm:max;
    const w = Math.round((end-cur)/DAY*PXD);
    mh += `<div class="gm" style="width:${w}px">${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][cur.getMonth()]} ${String(cur.getFullYear()).slice(2)}</div>`;
    cur = nm;
  }
  let wh='';
  for(let t=min.getTime(); t<max.getTime(); t+=7*DAY){
    const d = new Date(t);
    wh += `<div class="gw" style="width:${Math.round(7*PXD)}px">${d.getDate()}/${d.getMonth()+1}</div>`;
  }
  const todayX = Math.round((new Date(today()+'T00:00:00')-min)/DAY*PXD);

  // group rows by category
  const groups = {};
  sched.forEach(p=>{(groups[p.cat]=groups[p.cat]||[]).push(p)});
  const order = CATS.filter(c=>groups[c]).concat(Object.keys(groups).filter(c=>!CATS.includes(c)));

  let rows='';
  order.forEach(cat=>{
    rows += `<div class="grow grp-row"><div class="grow-label ${catClass(cat)}">${esc(cat)}</div><div class="gcanvas" style="width:${W}px"></div></div>`;
    groups[cat].sort((a,b)=>a.start<b.start?-1:1).forEach(p=>{
      const st = stObj(p.status);
      const bx = x(p.start), bw = Math.max(Math.round((new Date(p.end+'T00:00:00')-new Date(p.start+'T00:00:00'))/DAY*PXD)+Math.round(PXD),14);
      const ragC = RAGS[p.rag]?RAGS[p.rag].color:st.color;
      const miles = (p.milestones||[]).filter(m=>m.date).map(m=>
        `<div class="gmile ${m.done?'done':''}" style="left:${x(m.date)}px" title="◆ ${fmtD(m.date)} — ${esc(m.label)}"></div>`).join('');
      rows += `
      <div class="grow">
        <div class="grow-label" onclick="openEditModal('${p.id}')">
          <div class="gl-title"><span class="ragdot" style="background:${ragC}"></span>${esc(p.title)}</div>
          <div class="gl-sub">${esc(p.owner||'—')}${p.priority?' · '+p.priority:''}${p.effort?' · '+p.effort:''} · ${p.pct||0}%</div>
        </div>
        <div class="gcanvas" style="width:${W}px">
          <div class="gtoday" style="left:${todayX}px"></div>
          <div class="gbar" style="left:${bx}px;width:${bw}px;background:${st.color}22;border:1px solid ${st.color}77"
               onclick="openEditModal('${p.id}')" title="${esc(p.title)} · ${fmtD(p.start)} → ${fmtD(p.end)} · ${st.label} · ${p.pct||0}%">
            <div class="gbar-fill" style="width:${p.pct||0}%;background:${st.color}"></div>
            <div class="gbar-txt" style="color:${st.color}">${esc(p.title)}</div>
          </div>
          ${miles}
        </div>
      </div>`;
      if(showSubs && (p.subtasks||[]).length){
        const s0 = new Date(p.start+'T00:00:00'), e0 = new Date(p.end+'T00:00:00');
        const span = Math.max(1,(e0-s0)/DAY+1);
        const n = p.subtasks.length, seg = span/n;
        p.subtasks.forEach((s,si)=>{
          let ss, se;
          if(s.start && s.end){ss=new Date(s.start+'T00:00:00');se=new Date(s.end+'T00:00:00')}
          else{
            const a = Math.round(si*seg), b = Math.max(Math.round((si+1)*seg)-1, Math.round(si*seg));
            ss = new Date(s0.getTime()+a*DAY); se = new Date(s0.getTime()+b*DAY);
          }
          const sx = Math.round((ss-min)/DAY*PXD), sw = Math.max(Math.round((se-ss)/DAY*PXD)+Math.round(PXD),10);
          const c = s.done ? '#2ecc8a' : st.color;
          const dateInfo = s.start ? fmtD(s.start)+' → '+fmtD(s.end) : 'auto-scheduled '+fmtD(ss.toISOString().slice(0,10))+' → '+fmtD(se.toISOString().slice(0,10));
          rows += `
      <div class="grow sub-row">
        <div class="grow-label" onclick="openEditModal('${p.id}')"><div class="gl-subname">${s.done?'☑':'↳'} ${esc(s.text)}</div></div>
        <div class="gcanvas" style="width:${W}px">
          <div class="gtoday" style="left:${todayX}px"></div>
          <div class="gsbar ${s.done?'done':''}" style="left:${sx}px;width:${sw}px;background:${c}18;border:1px solid ${c}55;color:${c}"
               onclick="openEditModal('${p.id}')" title="${esc(s.text)} · ${dateInfo}${s.start?'':' (set dates in edit modal to pin)'}">${esc(s.text)}</div>
        </div>
      </div>`;
        });
      }
    });
  });

  const usHtml = unsched.length ? `
    <div class="unsched">
      <h3>⚠ Unscheduled — requirements / dates needed (${unsched.length})</h3>
      <div class="unsched-items">${unsched.map(p=>`<div class="us-chip" onclick="openEditModal('${p.id}')"><b>${esc(p.cat)}</b>${esc(p.title)}</div>`).join('')}</div>
    </div>` : '';

  const subCount = sched.reduce((n,p)=>n+(p.subtasks||[]).length,0);
  gv.innerHTML = `
    <div class="gtoolbar">
      <button class="chip ${showSubs?'on':''}" onclick="toggleSubs()">${showSubs?'✓ Hide':'Show'} sub-tasks</button>
      <span class="fl">${sched.length} initiatives${showSubs?' · '+subCount+' sub-tasks':''} · sub-tasks without dates are spread evenly across their initiative</span>
    </div>
    <div class="gwrap" id="gwrap">
      <div class="ginner" style="width:${270+W}px">
        <div class="ghead">
          <div class="ghead-months"><div class="glabel" style="height:auto">Initiative</div>${mh}</div>
          <div class="ghead-weeks"><div class="glabel" style="font-size:8px">wk commencing</div>${wh}</div>
        </div>
        ${rows}
      </div>
    </div>${usHtml}`;
  // scroll to ~4 weeks before today
  const wrap = document.getElementById('gwrap');
  if(wrap) wrap.scrollLeft = Math.max(0, todayX - 300);
}

function setSort(k){ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=1}; renderTable(); }
function renderTable(){
  const data = [...filtered()];
  const stOrder = {planned:1,progress:2,review:3,complete:4,hold:5,missing:6};
  data.sort((a,b)=>{
    let av,bv;
    if(sortKey==='status'){av=stOrder[a.status];bv=stOrder[b.status]}
    else if(sortKey==='pct'){av=a.pct||0;bv=b.pct||0}
    else if(sortKey==='mile'){av=(nextMile(a)||{}).date||'9999';bv=(nextMile(b)||{}).date||'9999'}
    else{av=(a[sortKey]||'').toString().toLowerCase();bv=(b[sortKey]||'').toString().toLowerCase();if(!av)av='￿';if(!bv)bv='￿'}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  const tv = document.getElementById('tv');
  tv.innerHTML = `<table class="ptable">
    <thead><tr>${TCOLS.map(c=>`<th onclick="setSort('${c.k}')">${c.l}${sortKey===c.k?`<span class="arr">${sortDir>0?'▲':'▼'}</span>`:''}</th>`).join('')}</tr></thead>

function saveModal(){

    cat: document.getElementById('f-cat').value,
    status: document.getElementById('f-status2').value,

    end: document.getElementById('f-end').value,

function ghCfg(){try{return JSON.parse(localStorage.getItem(LSG)||'{}')}catch(e){return{}}}
function ghConfigured(){const c=ghCfg();return !!(c.owner&&c.repo&&c.token)}
let ghSha = null;
function setSync(state,label){
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot '+state;
  document.getElementById('sync-label').textContent = label;
}
function openGithubModal(){
  const c = ghCfg();
  document.getElementById('modal-title').textContent = 'GitHub Sync';
  document.getElementById('modal-body').innerHTML = `
    <div class="gh-info">Edits save to a JSON file in your repo, so the hosted page shows the latest plan on any device.<br>
    1. Create a fine-grained token at <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">github.com/settings/personal-access-tokens</a> with <b>Contents: Read &amp; write</b> on the roadmap repo only.<br>
    2. Enter details below, then <b>Save &amp; Pull</b>. The token stays in this browser's storage only.</div>
    <div class="frow">
      <div class="field"><label>Repo Owner</label><input id="gh-owner" value="${esc(c.owner||'salaz786')}"></div>
      <div class="field"><label>Repo Name</label><input id="gh-repo" value="${esc(c.repo||'squatwolf-roadmap')}"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Branch</label><input id="gh-branch" value="${esc(c.branch||'main')}"></div>
      <div class="field"><label>Data File Path</label><input id="gh-path" value="${esc(c.path||'plan-data.json')}"></div>
    </div>
    <div class="field"><label>Personal Access Token</label><input id="gh-token" type="password" value="${esc(c.token||'')}" placeholder="github_pat_…"></div>
    <div class="gh-msg" id="gh-msg"></div>`;
  document.getElementById('modal-foot').innerHTML = `
    <button class="btn-cancel" onclick="closeModal()">Close</button>
    <button class="btn-cancel" onclick="saveGhCfg().then(()=>pullFromGitHub(true))">Save &amp; Pull</button>
    <button class="btn-save" onclick="saveGhCfg().then(()=>pushToGitHub())">Save &amp; Push</button>`;
  document.getElementById('modal-overlay').classList.add('on');
}
function ghMsg(t,ok){
  const el = document.getElementById('gh-msg');
  if(!el) return;
  el.textContent = t; el.className = 'gh-msg show '+(ok?'ok':'err');
}
async function saveGhCfg(){
  const c = {
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim()||'main',
    path: document.getElementById('gh-path').value.trim()||'plan-data.json',
    token: document.getElementById('gh-token').value.trim(),
  };
  localStorage.setItem(LSG,JSON.stringify(c));
  return c;
}
function ghUrl(c){return `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${c.path}?ref=${c.branch}`}
function ghHeaders(c){return {Authorization:'Bearer '+c.token,Accept:'application/vnd.github+json'}}
async function pullFromGitHub(fromModal){
  const c = ghCfg();
  if(!ghConfigured()){if(fromModal)ghMsg('Fill in owner, repo and token first',false);return}
  setSync('pushing','Pulling…');
  try{
    const r = await fetch(ghUrl(c),{headers:ghHeaders(c)});
    if(r.status===404){ghSha=null;setSync('dirty','No data file yet — push to create');if(fromModal)ghMsg('File not found in repo — click Save & Push to create it with current data.',false);return}
    if(!r.ok) throw new Error('GitHub API '+r.status);
    const j = await r.json();
    ghSha = j.sha;
    const txt = decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    const d = JSON.parse(txt);
    if(Array.isArray(d.items)){
      projects = d.items.map(normalize);
      localStorage.setItem(LSD,JSON.stringify({version:DATA_VERSION,items:projects}));
      render();
      setSync('synced','Synced '+new Date().toLocaleTimeString());
      document.getElementById('sync-banner').classList.remove('show');
      if(fromModal)ghMsg('Pulled '+projects.length+' initiatives from GitHub ✓',true);
      else showToast('Loaded latest plan from GitHub');
    } else throw new Error('Unexpected data format');
  }catch(e){
    setSync('error','Pull failed');
    if(fromModal)ghMsg('Pull failed: '+e.message,false); else showToast('GitHub pull failed');
  }
}
async function pushToGitHub(){
  const c = ghCfg();
  if(!ghConfigured()){openGithubModal();return}
  setSync('pushing','Pushing…');
  try{
    // refresh sha first to avoid conflicts
    try{
      const r0 = await fetch(ghUrl(c),{headers:ghHeaders(c)});
      if(r0.ok){ghSha = (await r0.json()).sha}
      else if(r0.status===404){ghSha=null}
    }catch(e){}
    const payload = {version:DATA_VERSION,lastUpdated:new Date().toISOString(),items:projects};
    const body = {
      message:'Update project plan — '+new Date().toISOString().slice(0,16).replace('T',' '),
      content: btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2)))),
      branch: c.branch,
    };
    if(ghSha) body.sha = ghSha;
    const r = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${c.path}`,{
      method:'PUT',headers:Object.assign({'Content-Type':'application/json'},ghHeaders(c)),body:JSON.stringify(body)});
    if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.message||('GitHub API '+r.status))}
    const j = await r.json();
    ghSha = j.content.sha;
    setSync('synced','Synced '+new Date().toLocaleTimeString());
    document.getElementById('sync-banner').classList.remove('show');
    ghMsg('Pushed '+projects.length+' initiatives to GitHub ✓',true);
    showToast('Plan pushed to GitHub');
  }catch(e){
    setSync('error','Push failed');
    ghMsg('Push failed: '+e.message,false);
    showToast('GitHub push failed — '+e.message);
  }
}

function dl(name,text,type){
  const a = document.createElement('a');

}

}
function exportCSV(){
  const cols = ['title','cat','status','owner','priority','rag','start','end','pct','effort','budget','blockers','notes'];
  const head = ['Initiative','Category','Status','Owner','Priority','RAG','Start','End','%','Effort','Budget','Blockers','Notes'];
  const q = v => '"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const rows = [head.map(q).join(',')].concat(projects.map(p=>cols.map(k=>q(k==='status'?stObj(p.status).label:p[k])).join(',')));

  showToast('CSV downloaded');
}

  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2600);
}
window.addEventListener('beforeunload',e=>{
  if(document.getElementById('sync-banner').classList.contains('show')){e.preventDefault();e.returnValue=''}
});
projects = loadLocal();
render();
if(ghConfigured()){pullFromGitHub(false)} else {setSync('','Local only — configure Sync')}
</script>
</body>
</html>
